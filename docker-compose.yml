services:
  db:
    image: postgres:16-alpine
    container_name: sitesentinel-db
    environment:
      POSTGRES_DB: sitesentinel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sitesentinel-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    container_name: sitesentinel-migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/sitesentinel?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
      - ./migrator/run-migrations.sh:/run-migrations.sh:ro
    entrypoint: ["bash", "/run-migrations.sh"]
    restart: "no"

  api:
    container_name: sitesentinel-api
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      REDIS_ADDR: "redis:6379"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/sitesentinel?sslmode=disable"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q '\"status\":\"ok\"'"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data: